# docker-compose.override.yml
#
# Dev-only overrides. This file is automatically merged by Docker Compose
# when you run `docker compose up` locally (no extra flags needed).
#
# For production / staging, do NOT copy this file to the server.
# The base docker-compose.yml runs the baked image as-is.
#
# Usage:
#   dev:  docker compose up                  (merges this file automatically)
#   prod: docker compose -f docker-compose.yml up   (base only, no dev mounts)

x-airflow-dev-volumes: &dev-volumes
  volumes:
    # Live-reload: edits on the host are reflected immediately inside the container.
    # Remove these in prod so the baked image code is what actually runs.
    - ./ingestion/dags:/opt/airflow/dags
    - ./ingestion/src:/opt/airflow/ingestion/src
    - ./libs/logger/src:/opt/airflow/libs/logger/src

    # Persistent bronze zone — must match BRONZE_DIR in .env
    - /data:/opt/data

    # Logs and plugins (convenience mounts, not code)
    - ./ingestion/logs:/opt/airflow/logs
    - ./ingestion/plugins:/opt/airflow/plugins

    # GCP service account (read-only)
    - ./secrets/gcp-service-account.json:/opt/airflow/secrets/gcp-service-account.json:ro

services:
  # Runs once as root to ensure the bronze zone exists and is owned by the
  # airflow user (uid 50000) before the scheduler or webserver start.
  init_dirs:
    image: alpine:3.19
    user: root
    volumes:
      - /data:/opt/data
    command: >
      sh -c "mkdir -p /opt/data/bronze &&
             chown -R 50000:0 /opt/data &&
             chmod -R 775 /opt/data &&
             echo 'Directory permissions set OK'"

  airflow-webserver:
    <<: *dev-volumes
    depends_on:
      init_dirs:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *dev-volumes
    depends_on:
      init_dirs:
        condition: service_completed_successfully

  airflow-init:
    <<: *dev-volumes
