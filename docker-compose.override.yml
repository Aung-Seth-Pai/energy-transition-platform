# docker-compose.override.yml
#
# Dev-only overrides. Merged automatically by Docker Compose locally.
# For production: docker compose -f docker-compose.yml up

x-airflow-dev-volumes: &dev-volumes
  volumes:
    - ./ingestion/dags:/opt/airflow/dags
    - ./ingestion/src:/opt/airflow/ingestion/src
    - ./libs/logger/src:/opt/airflow/libs/logger/src
    - ./data:/opt/data
    - ./ingestion/logs:/opt/airflow/logs
    - ./ingestion/plugins:/opt/airflow/plugins
    - ./secrets/gcp-service-account.json:/opt/airflow/secrets/gcp-service-account.json:ro

services:
  init_dirs:
    image: alpine:3.19
    user: root
    volumes:
      - ./data:/opt/data
    command: >
      sh -c "mkdir -p /opt/data/bronze /opt/data/warehouse &&
             chmod 777 /opt/data/warehouse &&
             chown -R 50000:0 /opt/data &&
             chmod -R 775 /opt/data &&
             echo 'Directory permissions set OK'"

  airflow-webserver:
    <<: *dev-volumes
    depends_on:
      init_dirs:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *dev-volumes
    depends_on:
      init_dirs:
        condition: service_completed_successfully

  airflow-init:
    <<: *dev-volumes

  # dbt + DuckDB transformation runner.
  # Packages are baked into the image at build time (dbt deps runs in Dockerfile).
  # Rebuild the image when packages.yml changes: docker compose build dbt
  #
  # Usage:
  #   docker compose run --rm dbt run
  #   docker compose run --rm dbt test
  #   docker compose run --rm dbt run --select stg_ember__generation
  dbt:
    build:
      context: ./transform
      dockerfile: Dockerfile
    volumes:
      # Live-reload model/test/macro edits without rebuilding the image.
      # These override the COPY . . layer from the Dockerfile at runtime,
      # so you edit locally and changes are reflected immediately.
      - ./transform/models:/transform/models
      - ./transform/macros:/transform/macros
      - ./transform/tests:/transform/tests
      # Shared data — reads bronze JSON, writes DuckDB warehouse file.
      - ./data:/opt/data
    environment:
      BRONZE_DIR: /opt/data/bronze
      DUCKDB_PATH: /opt/data/warehouse/transitionwatch.duckdb
    profiles:
      - tools
    depends_on:
      init_dirs:
        condition: service_completed_successfully